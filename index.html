<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Management — O-1B Visa Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a3561;--navy-dark:#0f2040;--navy-light:#e8edf5;
  --blue:#1455d4;--white:#fff;--off-white:#f4f6fa;
  --gray:#666;--light-gray:#eef1f7;--border:#dde3ee;
  --success:#1a6b3c;--success-bg:#edf7f2;
  --danger:#c0392b;--danger-bg:#fdf0ee;
  --male-bg:#ddeeff;--male-border:#b8d8f0;--male-text:#1a4a7a;
  --female-bg:#fde8f0;--female-border:#f0c0d8;--female-text:#7a1a40;
}
body{background:#f0f3f9;color:#111;font-family:'Barlow',sans-serif;min-height:100vh;font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#f0f0f0}::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
.lbl{font-size:9px;letter-spacing:.18em;color:var(--gray);display:block;margin-bottom:5px;font-family:'Barlow Condensed',sans-serif;font-weight:600}
input,select,textarea{background:#fff;border:1px solid var(--border);color:#111;font-family:'Barlow',sans-serif;font-size:12px;padding:7px 10px;width:100%;outline:none;transition:border-color .15s;border-radius:3px;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--navy)}
.btn{border:none;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.12em;font-weight:700;cursor:pointer;transition:all .15s;padding:8px 16px;border-radius:3px}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy-dark)}
.btn-outline{background:transparent;color:var(--navy);border:1px solid var(--navy)}.btn-outline:hover{background:var(--navy-light)}
.btn-success{background:transparent;color:var(--success);border:1px solid var(--success)}.btn-success:hover{background:var(--success-bg)}
.btn-ghost{background:transparent;color:var(--gray);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--navy);color:var(--navy)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}.btn-danger:hover{background:var(--danger-bg)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:6px;padding:28px 32px;width:560px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.check{width:16px;height:16px;border:1.5px solid var(--border);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .12s;vertical-align:middle;border-radius:2px}
.check.on{background:var(--navy);border-color:var(--navy)}
.gender-toggle{display:flex;border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.gender-btn{flex:1;padding:7px 10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.1em;font-weight:600;border:none;cursor:pointer;transition:all .15s;background:#fff;color:var(--gray)}
.gender-btn.male.active{background:var(--male-bg);color:var(--male-text)}
.gender-btn.female.active{background:var(--female-bg);color:var(--female-text)}
.status-pill{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.1em;font-weight:700;padding:3px 8px;border-radius:2px;white-space:nowrap}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.1em;padding:10px 20px;border-radius:3px;z-index:200;display:none;white-space:nowrap}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300}
.doc-review-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--light-gray);background:#fff}
.doc-review-item:hover{background:var(--off-white)}
</style>
</head>

// ── AIRTABLE API ──
async function atGet(table, formula="", sort="") {
  let url=`https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(table)}`;
  const params=new URLSearchParams();
  if(formula)params.set("filterByFormula",formula);
  if(sort)params.set("sort[0][field]",sort);
  if(params.toString())url+="?"+params.toString();
  const r=await fetch(url,{headers:{"Authorization":`Bearer ${AT_KEY}`}});
  if(!r.ok)throw new Error(await r.text());
  const d=await r.json();
  return d.records||[];
}

async function atCreate(table, fields) {
  const r=await fetch(`https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(table)}`,{
    method:"POST",
    headers:{"Authorization":`Bearer ${AT_KEY}`,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  if(!r.ok)throw new Error(await r.text());
  return await r.json();
}

async function atUpdate(table, id, fields) {
  const r=await fetch(`https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(table)}/${id}`,{
    method:"PATCH",
    headers:{"Authorization":`Bearer ${AT_KEY}`,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  if(!r.ok)throw new Error(await r.text());
  return await r.json();
}

async function atDelete(table, id) {
  const r=await fetch(`https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(table)}/${id}`,{
    method:"DELETE",
    headers:{"Authorization":`Bearer ${AT_KEY}`}
  });
  if(!r.ok)throw new Error(await r.text());
  return await r.json();
}

// ── LOAD CASES ──
async function loadCases() {
  try {
    document.getElementById("loadingMsg").textContent="Loading cases...";
    const records=await atGet("Models","","Model Name");
    cases=records.map((r,i)=>({
      id:r.id,
      modelName:r.fields["Model Name"]||"",
      email:r.fields["Email"]||"",
      gender:(r.fields["Gender"]||"").toLowerCase(),
      agent:r.fields["Agent"]||"",
      board:r.fields["Board"]||"",
      filingType:r.fields["Filing Type"]||"Standard",
      motherAgency:r.fields["Mother Agency"]||"",
      maAgent:r.fields["MA Agent Name"]||"",
      maEmail:r.fields["MA Email"]||"",
      targetDate:r.fields["Target Date"]||"",
      status:r.fields["Case Status"]||"Draft",
      notes:r.fields["Notes"]||"",
      appStart:r.fields["Application Start Date"]||"",
      docs:r.fields["Documents"]||[],  // linked record IDs
      num:records.length-i,
    }));
    document.getElementById("loadingScreen").style.display="none";
    renderDashboard();
  } catch(e) {
    document.getElementById("loadingMsg").textContent="Error loading: "+e.message;
  }
}

// ── LOAD DOCUMENTS FOR A CASE ──
async function loadDocuments(modelId) {
  try {
    const records=await atGet("Documents",`{Model}="${getCase(modelId)?.modelName}"`);
    return records;
  } catch(e) {
    console.error("Doc load error:",e);
    return [];
  }
}

// ── HELPERS ──
function getCase(id){return cases.find(c=>c.id===id);}
function fmtDate(s){if(!s)return"—";const d=new Date(s+"T00:00:00");return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"});}
function genderStyle(g){
  if(g==="male")return{bg:"var(--male-bg)",border:"var(--male-border)",text:"var(--male-text)"};
  if(g==="female")return{bg:"var(--female-bg)",border:"var(--female-border)",text:"var(--female-text)"};
  return{bg:"#fff",border:"var(--border)",text:"#111"};
}
function showToast(msg,duration=3000){
  const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";
  setTimeout(()=>t.style.display="none",duration);
}
function downloadFile(b64,filename,mime){
  const b=atob(b64),n=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++)n[i]=b.charCodeAt(i);
  const blob=new Blob([n],{type:mime}),url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}
function triggerDownloads(){
  showToast("Downloading files...");
  setTimeout(()=>downloadFile(CHECKLIST_PDF_B64,"01_VISA_CHECKLIST.pdf","application/pdf"),100);

}

// ── DEBOUNCED FIELD UPDATE ──
function debouncedUpdate(caseId, fields, delay=800) {
  if(updateTimers[caseId])clearTimeout(updateTimers[caseId]);
  updateTimers[caseId]=setTimeout(async()=>{
    try{await atUpdate("Models",caseId,fields);}
    catch(e){showToast("Save error: "+e.message);}
  },delay);
}

async function createCase(){
  const name=document.getElementById("f_name").value.trim();
  if(!name){document.getElementById("createError").textContent="Model name is required.";document.getElementById("createError").style.display="block";return;}
  const btn=document.getElementById("createBtn");
  btn.textContent="CREATING...";btn.disabled=true;
  try {
    const fields={
      "Model Name":name,
      "Email":document.getElementById("f_model_email").value.trim(),
      "Agent":document.getElementById("f_agent").value,
      "Board":document.getElementById("f_board").value,
      "Gender":selectedGender?selectedGender.charAt(0).toUpperCase()+selectedGender.slice(1):"",
      "Filing Type":document.getElementById("f_filing").value,
      "Mother Agency":document.getElementById("f_mother").value,
      "MA Agent Name":document.getElementById("f_ma_agent").value.trim(),
      "MA Email":document.getElementById("f_ma_email").value.trim(),
      "Target Date":document.getElementById("f_date").value,
      "Case Status":"Draft",
      "Application Start Date":new Date().toISOString().split("T")[0]
    };
    const rec=await atCreate("Models",fields);
    const newCase={
      id:rec.id,modelName:name,
      email:fields["Email"],gender:selectedGender,
      agent:fields["Agent"],board:fields["Board"],
      filingType:fields["Filing Type"],
      motherAgency:fields["Mother Agency"],
      maAgent:fields["MA Agent Name"],
      maEmail:fields["MA Email"],
      targetDate:fields["Target Date"],
      status:"Draft",notes:"",docs:[],appStart:fields["Application Start Date"],
    };
    cases.unshift(newCase);
    closeNewModal();
    ["f_name","f_model_email","f_mother","f_ma_agent","f_ma_email"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("f_agent").value="";document.getElementById("f_board").value="";
    showToast("✓ Case created — portal ready for "+name);
    openDetail(rec.id);
  } catch(e) {
    document.getElementById("createError").textContent="Error: "+e.message;
    document.getElementById("createError").style.display="block";
  } finally {
    btn.textContent="OPEN CASE";btn.disabled=false;
  }
}

function renderDashboard(){
  document.getElementById("dashboard").style.display="block";
  document.getElementById("detail").style.display="none";
  document.getElementById("backBtn").style.display="none";
  document.getElementById("newCaseBtn").style.display="block";

  const sb=document.getElementById("statusBar");sb.innerHTML="";
  let activeFilter=null;
  Object.entries(STATUS_META).forEach(([s,m])=>{
    const count=cases.filter(c=>c.status===s).length;
    const card=document.createElement("div");
    card.style.cssText="background:#fff;border-radius:4px;padding:10px 14px;min-width:110px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;border:2px solid transparent;transition:all .15s";
    card.innerHTML=`<div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:${m.text}">${count}</div><div style="font-size:8px;letter-spacing:.12em;color:#aaa;margin-top:2px">${s.toUpperCase()}</div>`;
    card.addEventListener("click",()=>{
      activeFilter=activeFilter===s?null:s;
      document.querySelectorAll("#statusBar > div").forEach(c=>c.style.borderColor="transparent");
      if(activeFilter)card.style.borderColor=m.border;
      renderRows(activeFilter?cases.filter(c=>c.status===activeFilter):cases);
    });
    sb.appendChild(card);
  });

  const activeCases = cases.filter(c => c.status !== "Archived");
  const archivedCount = cases.filter(c => c.status === "Archived").length;

  // Add show archived toggle
  let toggleBar = document.getElementById("archiveToggle");
  if(!toggleBar) {
    toggleBar = document.createElement("div");
    toggleBar.id = "archiveToggle";
    toggleBar.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:12px";
    document.getElementById("statusBar").after(toggleBar);
  }
  toggleBar.innerHTML = archivedCount > 0 ? `
    <div style="font-size:11px;color:var(--gray)">${archivedCount} archived case${archivedCount>1?"s":""}</div>
    <button onclick="toggleArchived()" id="archiveBtn" style="background:transparent;border:1px solid var(--border);color:var(--gray);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.1em;cursor:pointer;padding:4px 10px;border-radius:3px">SHOW ARCHIVED</button>
  ` : '';

  if(activeCases.length===0 && archivedCount===0){
    document.getElementById("emptyState").style.display="block";
    document.getElementById("caseTable").style.display="none";
  } else {
    document.getElementById("emptyState").style.display="none";
    document.getElementById("caseTable").style.display="block";
    renderRows(activeCases);
  }
}

let showingArchived = false;
function toggleArchived() {
  showingArchived = !showingArchived;
  const btn = document.getElementById("archiveBtn");
  if(showingArchived) {
    btn.textContent = "HIDE ARCHIVED";
    renderRows(cases);
  } else {
    btn.textContent = "SHOW ARCHIVED";
    renderRows(cases.filter(c => c.status !== "Archived"));
  }
}

function renderRows(data){
  const rows=document.getElementById("caseRows");rows.innerHTML="";
  data.forEach((c,i)=>{
    const m=STATUS_META[c.status]||STATUS_META["Draft"];
    const gs=genderStyle(c.gender);
    const num=cases.indexOf(c)+1;
    const docCount=c.docs?c.docs.length:0;
    const pct=Math.round(docCount/16*100);
    const fillColor=pct===100?"var(--success)":"var(--blue)";
    const row=document.createElement("div");
    row.style.cssText=`display:grid;grid-template-columns:40px 2fr 100px 1fr 1fr 1fr 110px 110px;padding:12px 16px;border-bottom:1px solid ${gs.border};align-items:center;background:${gs.bg};cursor:pointer;transition:filter .12s`;
    row.onmouseover=function(){this.style.filter="brightness(.97)";};
    row.onmouseout=function(){this.style.filter="none";};
    row.innerHTML=`
      <div style="font-size:11px;color:#aaa;font-family:'Barlow Condensed',sans-serif">${num}</div>
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--navy);letter-spacing:.03em">${c.modelName}</div>
        <div style="font-size:10px;color:#aaa;margin-top:1px">${c.appStart?fmtDate(c.appStart):""}</div>
      </div>

      <div style="font-size:12px;color:#555">${c.agent||"—"}</div>
      <div style="font-size:12px;color:#555">${c.board||"—"}</div>

        <div style="flex:1;height:4px;background:#e8edf5;border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${fillColor};border-radius:2px"></div></div>

      <div><span class="status-pill" style="color:${m.text};background:${m.bg};border:1px solid ${m.border}">${(c.status||"Draft").toUpperCase()}</span></div>`;
    row.addEventListener("click",()=>openDetail(c.id));
    rows.appendChild(row);
  });
}

// ── DETAIL VIEW ──
function showDashboard(){activeId=null;renderDashboard();}
function openDetail(id){
  activeId=id;

async function loadDocumentsForDetail(caseId) {

  c.loadedDocs=docs;
  renderDocsSection(docs);
}

// ── RENDER DOCUMENTS SECTION ──
function renderDocsSection(docs){
  const loading=document.getElementById("docsLoading");
  const list=document.getElementById("docsList");
  if(!loading||!list)return;
  loading.style.display="none";

  if(!docs||docs.length===0){
    list.innerHTML=`<div style="padding:20px;text-align:center;color:var(--gray);font-size:12px">No documents uploaded yet.<br><span style="font-size:11px;color:#bbb">Model uploads will appear here automatically.</span></div>`;
    return;
  }

  docs.forEach(doc=>{
    const f=doc.fields;
    const attachments=f["File Attachment"]||[];
    const row=document.createElement("div");
    row.className="doc-review-item";

    const statusColors={"Received":"#1455d4","Reviewed":"#8b4500","Approved":"var(--success)","Rejected":"var(--danger)"};
    const statusColor=statusColors[f["Review Status"]]||"#888";

    row.innerHTML=`
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;color:#111;margin-bottom:2px">${f["Document Name"]||"Document"}</div>
        <div style="font-size:10px;color:#aaa">${f["Upload Date"]?fmtDate(f["Upload Date"]):""}${f["Notes"]?" · "+f["Notes"]:""}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;color:${statusColor};padding:2px 7px;border:1px solid ${statusColor}33;border-radius:2px">${f["Review Status"]||"Received"}</span>
        ${attachments.length?`<a href="${attachments[0].url}" target="_blank" style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--blue);text-decoration:none;letter-spacing:.08em">VIEW ↗</a>`:""}
      </div>`;

    // Review Status selector
    const sel=document.createElement("select");
    sel.style.cssText="font-size:10px;padding:4px 6px;width:auto;border-color:var(--border)";
    ["Received","Reviewed","Approved","Rejected"].forEach(s=>{
      const o=document.createElement("option");o.textContent=s;if(s===f["Review Status"])o.selected=true;sel.appendChild(o);
    });
    sel.addEventListener("change",async function(){
      try{await atUpdate("Documents",doc.id,{"Review Status":this.value});showToast("Status updated");}
      catch(e){showToast("Error: "+e.message);}
    });
    row.appendChild(sel);

    // Delete button
    const delBtn=document.createElement("button");
    delBtn.className="btn btn-danger";delBtn.style.cssText="font-size:9px;padding:4px 8px";delBtn.textContent="✕";
    delBtn.addEventListener("click",async()=>{
      if(!confirm("Remove this document?"))return;
      try{
        await atDelete("Documents",doc.id);
        row.remove();showToast("Document removed");
      }catch(e){showToast("Error: "+e.message);}
    });
    row.appendChild(delBtn);
    list.appendChild(row);
  });
}

// ── EMAIL FUNCTIONS ──
async function sendViaFlow(c,emailType){
  if(!FLOW_URL){alert("Flow URL not configured.");return;}
  const payload={emailType,agentName:c.agent||"",agentEmail:getAgentEmail(c.agent),modelName:c.modelName,modelEmail:c.email||"",maEmail:c.maEmail||"",maAgent:c.maAgent||"",motherAgency:c.motherAgency||"",filingType:c.filingType||"Standard",targetDate:c.targetDate||"TBD",caseNumber:cases.indexOf(c)+1,progressPct:0};
  try{
    const resp=await fetch(FLOW_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    if(resp.ok)showToast("✓ Email sent via Outlook");
    else showToast("Flow error: "+resp.status);
  }catch(e){showToast("Could not reach flow");}
}
function draftModelEmail(c){
  const subject="O-1 Visa Application — Next Steps";
  const body=`Hello,\n\nTo get started on your O-1 Visa application, we have set up your personal Visa Application Portal:\n\n${PORTAL_URL}\n\nAll you need is your email address to log in.\n\nPlease start by completing the O-1 Bio Form and uploading your Tearsheets.\n\nBest,\n${c.agent||"Two Management"}`;
  const to=[c.email,c.maEmail].filter(Boolean).join(",");

}

}
